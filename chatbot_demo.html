<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PolAI Chatbot – Demo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;}
.demo-label{font-size:12px;color:#666;text-align:center;margin-bottom:12px;letter-spacing:0.03em;}
.demo-label strong{color:#185FA5;}
.chat-wrap{width:100%;max-width:400px;border-radius:16px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.12);background:#fff;}
.chat-header{background:#185FA5;padding:14px 16px;display:flex;align-items:center;gap:10px;}
.header-avatar{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#fff;flex-shrink:0;}
.header-info{flex:1;}
.header-name{color:#fff;font-size:14px;font-weight:600;}
.header-status{color:rgba(255,255,255,0.8);font-size:12px;display:flex;align-items:center;gap:4px;}
.status-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;}
.chat-messages{height:380px;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:#f7f9fc;}
.msg{max-width:85%;display:flex;flex-direction:column;gap:3px;}
.msg.bot{align-self:flex-start;}
.msg.user{align-self:flex-end;}
.bubble{padding:10px 13px;border-radius:16px;font-size:13px;line-height:1.55;white-space:pre-line;}
.msg.bot .bubble{background:#fff;border:1px solid #e8ecf0;color:#1a1a1a;border-bottom-left-radius:4px;}
.msg.user .bubble{background:#185FA5;color:#fff;border-bottom-right-radius:4px;}
.msg-time{font-size:10px;color:#aaa;}
.msg.user .msg-time{text-align:right;}
.quick-replies{display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px;border-top:1px solid #f0f0f0;background:#fff;}
.qr{font-size:12px;padding:6px 12px;border-radius:20px;border:1px solid #185FA5;background:#fff;color:#185FA5;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.qr:hover{background:#185FA5;color:#fff;}
.chat-input-row{display:flex;gap:8px;padding:10px 12px;border-top:1px solid #f0f0f0;background:#fff;}
.chat-input{flex:1;border:1px solid #ddd;border-radius:20px;padding:9px 14px;font-size:13px;font-family:inherit;outline:none;background:#f7f9fc;color:#1a1a1a;}
.chat-input:focus{border-color:#185FA5;}
.send-btn{width:36px;height:36px;border-radius:50%;background:#185FA5;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.send-btn svg{width:15px;height:15px;fill:#fff;}
.typing-wrap{align-self:flex-start;}
.typing-bubble{background:#fff;border:1px solid #e8ecf0;border-radius:16px;border-bottom-left-radius:4px;padding:10px 14px;display:flex;gap:4px;align-items:center;}
.dot{width:7px;height:7px;border-radius:50%;background:#bbb;animation:bounce 1.2s infinite;}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.powered{text-align:center;font-size:11px;color:#aaa;padding:8px;background:#fff;border-top:1px solid #f0f0f0;}
.powered a{color:#185FA5;text-decoration:none;}
.footer-info{margin-top:16px;text-align:center;font-size:12px;color:#888;line-height:1.6;}
.footer-info a{color:#185FA5;text-decoration:none;font-weight:600;}
</style>
</head>
<body>

<div class="demo-label">Demo asystenta AI przygotowane przez <strong>PolAI</strong><br>Ten chatbot może działać na stronie Twojej firmy 24/7</div>

<div class="chat-wrap">
  <div class="chat-header">
    <div class="header-avatar">GU</div>
    <div class="header-info">
      <div class="header-name">Galeria Uśmiechu Opole</div>
      <div class="header-status"><span class="status-dot"></span>Dostępny całą dobę</div>
    </div>
  </div>
  <div class="chat-messages" id="messages"></div>
  <div class="quick-replies" id="quick-replies"></div>
  <div class="chat-input-row">
    <input class="chat-input" id="input" placeholder="Napisz wiadomość..." />
    <button class="send-btn" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="powered">PolAI Chatbot by <a href="https://polai-website.vercel.app" target="_blank">PolAI</a></div>
</div>

<div class="footer-info">
  Chcesz taki chatbot dla swojej firmy?<br>
  <a href="https://polai-website.vercel.app" target="_blank">polai-website.vercel.app</a> · michal.poloczekk@gmail.com
</div>

<script>
const flows={
  start:{bot:"Dzień dobry! Jestem asystentem Galerii Uśmiechu w Opolu.\nW czym mogę pomóc?",replies:["Chcę umówić wizytę","Cennik usług","Godziny otwarcia","Nagły ból zęba"]},
  "Chcę umówić wizytę":{bot:"Oczywiście! Jaka usługa Cię interesuje?",replies:["Przegląd i kontrola","Leczenie kanałowe","Implanty","Wybielanie","Ortodoncja"]},
  "Przegląd i kontrola":{bot:"Przegląd ogólny to koszt 150 zł. Mamy wolne terminy już w tym tygodniu.\n\nPodaj proszę swoje imię i numer telefonu – recepcja potwierdzi wizytę SMS-em w ciągu kilku minut.",replies:["Wróć do menu"]},
  "Leczenie kanałowe":{bot:"Leczenie kanałowe wyceniamy indywidualnie – zwykle 600–1200 zł zależnie od zęba.\n\nChcesz umówić bezpłatną konsultację wyceny?",replies:["Tak, umów konsultację","Wróć do menu"]},
  "Implanty":{bot:"Implant zębowy to inwestycja na całe życie. Koszt całości: 3000–5000 zł.\n\nZapraszamy na bezpłatną konsultację ze zdjęciem RTG. Podać wolne terminy?",replies:["Tak, podaj terminy","Wróć do menu"]},
  "Wybielanie":{bot:"Wybielanie gabinetowe – od 400 zł. Efekt widoczny od razu po pierwszej wizycie!\n\nChcesz się umówić?",replies:["Tak, umów wizytę","Wróć do menu"]},
  "Ortodoncja":{bot:"Oferujemy aparaty stałe i przezroczyste nakładki Invisalign.\n\nKonsultacja ortodontyczna: 100 zł (wliczana w koszt leczenia).\n\nChcesz umówić konsultację?",replies:["Tak, umów konsultację","Wróć do menu"]},
  "Cennik usług":{bot:"Przykładowy cennik:\n• Przegląd – 150 zł\n• Plomba – od 200 zł\n• Wybielanie – od 400 zł\n• Leczenie kanałowe – od 600 zł\n• Konsultacja ortodont. – 100 zł\n• Implant – od 3000 zł\n\nMasz pytanie o konkretną usługę?",replies:["Umów wizytę","Wróć do menu"]},
  "Godziny otwarcia":{bot:"Gabinet czynny:\nPn–Wt: 9:00–20:00\nŚr–Czw: 9:00–20:00\nPt: 9:00–15:00\nSobota: 9:00–13:00\nNiedziela: nieczynne\n\nW nagłych przypadkach bólowych – zadzwoń: 736 841 664",replies:["Umów wizytę","Nagły ból zęba"]},
  "Nagły ból zęba":{bot:"Rozumiemy – ból zęba nie czeka!\n\nW pilnych przypadkach zadzwoń bezpośrednio:\n📞 574 940 983\n\nStaramy się przyjąć pacjentów bólowych tego samego dnia w godzinach pracy gabinetu.",replies:["Godziny otwarcia","Umów wizytę"]},
  "Tak, umów konsultację":{bot:"Podaj proszę swoje imię i numer telefonu – recepcja oddzwoni i potwierdzi termin konsultacji.",replies:["Wróć do menu"]},
  "Tak, podaj terminy":{bot:"Wolne terminy na konsultację implantologiczną:\n• Wtorek 12:00\n• Środa 10:00\n• Czwartek 15:30\n\nKtóry termin Ci odpowiada?",replies:["Wtorek 12:00","Środa 10:00","Czwartek 15:30"]},
  "Tak, umów wizytę":{bot:"Podaj proszę swoje imię i numer telefonu – recepcja wyśle potwierdzenie SMS-em.",replies:["Wróć do menu"]},
  "Wtorek 12:00":{bot:"Wtorek 12:00 – zarezerwowane wstępnie.\n\nPodaj imię i numer telefonu – recepcja wyśle potwierdzenie SMS-em.",replies:["Wróć do menu"]},
  "Środa 10:00":{bot:"Środa 10:00 – zarezerwowane wstępnie.\n\nPodaj imię i numer telefonu – recepcja wyśle potwierdzenie SMS-em.",replies:["Wróć do menu"]},
  "Czwartek 15:30":{bot:"Czwartek 15:30 – zarezerwowane wstępnie.\n\nPodaj imię i numer telefonu – recepcja wyśle potwierdzenie SMS-em.",replies:["Wróć do menu"]},
  "Umów wizytę":{bot:"Jaka usługa Cię interesuje?",replies:["Przegląd i kontrola","Leczenie kanałowe","Implanty","Wybielanie","Ortodoncja"]},
  "Wróć do menu":{bot:"Oczywiście! Jak mogę jeszcze pomóc?",replies:["Chcę umówić wizytę","Cennik usług","Godziny otwarcia","Nagły ból zęba"]}
};

const msgs=document.getElementById('messages');
const qr=document.getElementById('quick-replies');
const inp=document.getElementById('input');

function now(){return new Date().toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});}

function addMsg(text,type){
  const m=document.createElement('div');
  m.className='msg '+type;
  const b=document.createElement('div');
  b.className='bubble';
  b.textContent=text;
  const t=document.createElement('div');
  t.className='msg-time';
  t.textContent=now();
  m.appendChild(b);
  m.appendChild(t);
  msgs.appendChild(m);
  msgs.scrollTop=msgs.scrollHeight;
}

function showTyping(){
  const w=document.createElement('div');
  w.className='msg bot typing-wrap';
  w.id='typing';
  w.innerHTML='<div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  msgs.appendChild(w);
  msgs.scrollTop=msgs.scrollHeight;
}

function removeTyping(){const t=document.getElementById('typing');if(t)t.remove();}

function setReplies(replies){
  qr.innerHTML='';
  (replies||[]).forEach(r=>{
    const b=document.createElement('button');
    b.className='qr';
    b.textContent=r;
    b.onclick=()=>handle(r);
    qr.appendChild(b);
  });
}

function handle(text){
  addMsg(text,'user');
  setReplies([]);
  showTyping();
  setTimeout(()=>{
    removeTyping();
    const f=flows[text]||{bot:"Rozumiem. Recepcja skontaktuje się z Tobą wkrótce. Mogę jeszcze w czymś pomóc?",replies:["Wróć do menu"]};
    addMsg(f.bot,'bot');
    setReplies(f.replies);
  },900);
}

function send(){
  const v=inp.value.trim();
  if(!v)return;
  inp.value='';
  handle(v);
}

inp.addEventListener('keydown',e=>{if(e.key==='Enter')send();});

setTimeout(()=>{
  showTyping();
  setTimeout(()=>{
    removeTyping();
    addMsg(flows.start.bot,'bot');
    setReplies(flows.start.replies);
  },1000);
},400);
</script>
</body>
</html>
